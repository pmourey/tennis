{% extends "tournament/base_tournament.html" %}
{% block main %}
<div class="container">
  <h1>➕ Créer un tournoi</h1>
  <a href="{{ url_for('tournament.index') }}" class="btn btn-secondary">← Retour</a>

  <form method="POST" class="form-tournament">
    <div class="form-group">
      <label>Nom du tournoi *</label>
      <input type="text" name="name" class="form-control" required placeholder="ex: Open d'été 2026">
    </div>

    <div class="form-group">
      <label>Club organisateur *</label>
      <select name="club_id" class="form-control" required>
        <option value="">-- Sélectionner un club --</option>
        {% for club in clubs %}
        <option value="{{ club.id }}">{{ club.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <div class="form-group col">
        <label>Date de début *</label>
        <input type="date" name="start_date" class="form-control" required>
      </div>
      <div class="form-group col">
        <label>Date de fin *</label>
        <input type="date" name="end_date" class="form-control" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group col">
        <label>Type de tournoi</label>
        <select name="is_open" class="form-control">
          <option value="0">Interne (licenciés du club)</option>
          <option value="1">Open (autres clubs autorisés)</option>
        </select>
      </div>
      <div class="form-group col">
        <label>Surface de jeu</label>
        <select name="surface" class="form-control">
          <option value="TB">Terre battue</option>
          <option value="Dur">Dur</option>
          <option value="Gazon">Gazon</option>
          <option value="Synthétique">Synthétique</option>
          <option value="Mixte">Mixte</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Notes / Règlement particulier</label>
      <textarea name="notes" class="form-control" rows="3"></textarea>
    </div>

    <h3>Terrains disponibles</h3>
    <div id="courts-container">
      <div class="court-row form-row">
        <div class="form-group col">
          <input type="text" name="court_name[]" class="form-control" placeholder="Nom du terrain (ex: Court 1)">
        </div>
        <div class="form-group col">
          <select name="court_surface[]" class="form-control">
            <option value="TB">Terre battue</option>
            <option value="Dur">Dur</option>
            <option value="Gazon">Gazon</option>
            <option value="Synthétique">Synthétique</option>
          </select>
        </div>
      </div>
    </div>
    <button type="button" id="add-court-btn" class="btn btn-outline-secondary btn-sm">➕ Ajouter un terrain</button>

    <br><br>
    <button type="submit" class="btn btn-primary">Créer le tournoi</button>
    <a href="{{ url_for('tournament.index') }}" class="btn btn-secondary">Annuler</a>
  </form>
</div>

<script>
document.getElementById('add-court-btn').addEventListener('click', function() {
  const container = document.getElementById('courts-container');
  const row = container.querySelector('.court-row').cloneNode(true);
  row.querySelectorAll('input').forEach(i => i.value = '');
  container.appendChild(row);
});
</script>
{% endblock %}
